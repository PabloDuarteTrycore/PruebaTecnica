version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: evm_database
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - evm_network

  backend:
    build: ./backend
    container_name: evm_backend
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      FLASK_ENV: ${FLASK_ENV}
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
    networks:
      - evm_network

  frontend:
    build: ./frontend
    container_name: evm_frontend
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL}
    stdin_open: true
    tty: true
    depends_on:
      - backend
    networks:
      - evm_network

networks:
  evm_network:
    driver: bridge

volumes:
  postgres_data: